name: Build

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared contracts
        run: npm run build -w @cv-standardizer/shared-contracts

      - name: Build backend
        run: npm run build -w @cv-standardizer/backend-api

      - name: Build SPFx bundle
        run: npm run build -w @cv-standardizer/spfx-webpart

      - name: Package SharePoint solution
        working-directory: apps/spfx-webpart
        run: npx gulp package-solution --ship

      - name: Build CVTech2 Dashboard bundle
        run: npm run build -w @cv-standardizer/spfx-cvtech2-dashboard

      - name: Package CVTech2 Dashboard solution
        working-directory: apps/spfx-cvtech2-dashboard
        run: npx gulp package-solution --ship

      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: apps/backend-api/dist

      - name: Upload sppkg
        uses: actions/upload-artifact@v4
        with:
          name: cv-standardizer-sppkg
          path: apps/spfx-webpart/sharepoint/solution/cv-standardizer.sppkg

      - name: Upload CVTech2 sppkg
        uses: actions/upload-artifact@v4
        with:
          name: cvtech2-dashboard-sppkg
          path: apps/spfx-cvtech2-dashboard/sharepoint/solution/cvtech2-dashboard.sppkg
